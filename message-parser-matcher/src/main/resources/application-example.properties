spring.application.name=message-parser-matcher

spring.mongodb.uri=mongodb://mongodb:27017/product-parser-n-matcher

kafka.topic.telegram=match-topic
spring.kafka.bootstrap-servers=kafka:29092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=mch:com.example.messageparsermatcher.matcher.dto.MatchDto

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=tg:com.example.messageparsermatcher.product.dto.TgMessageDto,sq:com.example.messageparsermatcher.searchquery.dto.SearchQueryDto
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.messageparsermatcher.product.dto,com.example.messageparsermatcher.searchquery.dto