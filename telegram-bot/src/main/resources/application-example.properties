spring.application.name=telegram-bot

telegram.bot.token=YOUR_TG_BOT_TOKEN
telegram.bot.username=YOUR_TG_BOT_USERNAME

kafka.topic.telegram=search-topic
spring.kafka.bootstrap-servers=kafka:29092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.producer.properties.spring.json.type.mapping=sq:com.example.telegrambot.bot.dto.SearchQueryDto

spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.properties.spring.json.type.mapping=mch:com.example.telegrambot.bot.dto.MatchDto
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.telegrambot.bot.dto